   - agentic
   - roll
   - baseline

# track_with: tensorboard
# tracker_kwargs:
#   log_dir: /net/projects2/ycleong/sg/strategy-rl/MARSHAL/logs/tensorboard/${exp_name}

num_gpus_per_node: 4

max_steps: 200
save_steps: 5
# save_steps: 10
logging_steps: 1
eval_steps: 5
