defaults:
  - ../config/envs@_here_
  - ../config/deepspeed_zero@_here_
  - ../config/deepspeed_zero2@_here_
  - ../config/deepspeed_zero3@_here_
  - ../config/deepspeed_zero3_cpuoffload@_here_

hydra:
  run:
    dir: .
  output_subdir: null

exp_name: "agentic_hanabi_selfplay"
seed: 42
# logging_dir: /net/projects2/ycleong/sg/strategy-rl/MARSHAL/logs/${exp_name}
# output_dir: /net/projects2/ycleong/sg/strategy-rl/MARSHAL/results/${exp_name}

# render_save_dir: ./runs/render
system_envs:
  USE_MODELSCOPE: "1"

track_with: wandb
tracker_kwargs:
 api_key: ${oc.env:WANDB_API_KEY}
